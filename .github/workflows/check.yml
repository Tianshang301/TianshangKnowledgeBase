name: check
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: File count
        run: echo "Markdown files: $(find . -name '*.md' -not -path './.git/*' | wc -l)"

      - name: Check for U+FFFD
        run: |
          exit_code=0
          found=$(grep -rl $'\ufffd' --include='*.md' . 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "FAIL: files with replacement characters:"
            echo "$found"
            exit_code=1
          else
            echo "No U+FFFD found."
          fi
          exit $exit_code

      - name: Check broken wiki-links (full coverage)
        run: |
          exit_code=0
          find . -name '*.md' -not -path './.git/*' | while read f; do
            dir=$(dirname "$f")
            grep -oP '\[\[\K[^\]|#]+' "$f" 2>/dev/null | while read link; do
              target=$(echo "$link" | cut -d'|' -f1 | cut -d'#' -f1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$target" ] && continue
              [ "$target" = "INDEX" -o "$target" = "LearningPath" -o "$target" = "README" -o "$target" = "404" ] && continue

              if ! echo "$target" | grep -q '/'; then
                # Type 1: simple-name [[Link]] — check source dir first, then vault root
                if [ ! -f "$dir/$target.md" ] && [ ! -f "$target.md" ]; then
                  echo "BROKEN: $target (from $f)"
                  exit_code=1
                fi
              else
                # Type 2: path-based [[Dir/Subdir/File]] — absolute from root
                if [ ! -f "$target.md" ]; then
                  # Type 3: relative path [[../Sibling/File]]
                  resolved="$dir/$target.md"
                  if [ ! -f "$resolved" ]; then
                    echo "BROKEN: $target (from $f)"
                    exit_code=1
                  fi
                fi
              fi
            done
          done
          exit $exit_code

      - name: Validate frontmatter (aliases + tags)
        run: |
          exit_code=0
          find . -name '*.md' -not -path './.git/*' | while read f; do
            header=$(head -1 "$f")
            if [ "$header" != "---" ]; then
              echo "MISSING FM: $f"
              exit_code=1
              continue
            fi
            if ! grep -q '^aliases:' "$f"; then
              echo "MISSING aliases: $f"
              exit_code=1
            fi
            if ! grep -q '^tags:' "$f"; then
              echo "MISSING tags: $f"
              exit_code=1
            fi
          done
          exit $exit_code

      - name: Check file naming convention (UpperCamelCase)
        run: |
          exit_code=0
          find . -name '*.md' -not -path './.git/*' -not -path './.obsidian/*' | while read f; do
            base=$(basename "$f" .md)
            if echo "$base" | grep -qP '^[A-Za-z0-9_]+$'; then
              if ! echo "$base" | grep -qP '^[A-Z][a-zA-Z0-9]*$'; then
                case "$base" in
                  INDEX|README|LearningPath|404) ;;
                  *) echo "NON-CONFORMING: $f"; exit_code=1 ;;
                esac
              fi
            fi
          done
          exit $exit_code

      - name: Check trailing whitespace
        run: |
          if grep -rnP '\s+$' --include='*.md' . 2>/dev/null; then
            echo "FAIL: trailing whitespace found"
            exit 1
          fi
          echo "No trailing whitespace."

      - name: Verify INDEX.md in every directory
        run: |
          exit_code=0
          find . -type d -not -path './.git/*' -not -path './.obsidian/*' -not -path './.ruff_cache/*' | while read d; do
            if [ ! -f "$d/INDEX.md" ] && [ ! -f "$d/README.md" ]; then
              echo "MISSING INDEX: $d"
              exit_code=1
            fi
          done
          exit $exit_code

      - name: Warn about orphan files (no incoming wiki-links)
        run: |
          orphans=0
          find . -name '*.md' -not -path './.git/*' -not -name 'INDEX.md' -not -name 'README.md' -not -name '404.md' -not -name 'LearningPath.md' | while read f; do
            base=$(basename "$f" .md)
            if ! grep -qr "\[\[$base" --include='*.md' . 2>/dev/null; then
              rel=$(echo "$f" | sed 's|^\./||;s|\.md$||')
              if ! grep -qr "\[\[$rel" --include='*.md' . 2>/dev/null; then
                echo "ORPHAN: $f"
                orphans=$((orphans + 1))
              fi
            fi
          done
          if [ "$orphans" -gt 0 ]; then
            echo "WARNING: $orphans orphan files found (no incoming wiki-links)"
          else
            echo "No orphan files found."
          fi

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: '**/*.md'
          ignore: '.git/**'
